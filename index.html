<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>TapForge NFC – Smart NFC Business Cards & Google Review Stands</title>

    <meta
      name="description"
      content="TapForge NFC creates smart NFC business cards and Google review stands that let customers tap their phone to instantly leave reviews, access contact info, and connect with your business."
    />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (link previews) -->
    <meta property="og:title" content="TapForge NFC – Smart NFC Business Cards & Google Review Stands" />
    <meta
      property="og:description"
      content="TapForge NFC creates smart NFC business cards and Google review stands that let customers tap their phone to instantly leave reviews and connect with your business."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tapforgenfc.com" />

    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1f2937, #020617 60%);
        color: #e5e7eb;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        text-align: center;
        padding: 2rem;
      }

      .card {
        width: min(680px, 100%);
        background: rgba(15, 23, 42, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.3);
        border-radius: 16px;
        padding: 2.5rem 1.5rem;
        backdrop-filter: blur(6px);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2rem, 6vw, 3rem);
        letter-spacing: 0.03em;
      }

      p {
        margin: 0;
        font-size: clamp(1rem, 2.5vw, 1.25rem);
        color: #cbd5e1;
      }

      .subtext {
        margin-top: 1rem;
        font-size: 0.9rem;
        color: #94a3b8;
        line-height: 1.5;
      }

      a {
        color: #93c5fd;
        text-decoration: none;
      }

      a:hover,
      a:focus-visible {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <main class="card">
      <h1>TapForge</h1>

      <p>
        For inquiries, contact
        <a href="mailto:hello@tapforgenfc.com">hello@tapforgenfc.com</a>
      </p>

      <p class="subtext">
        TapForge builds NFC business cards and NFC Google review stands that let customers tap their phone to instantly leave reviews, access contact information, and connect with your business.
      </p>
    </main>
  </body>
</html>
